name: MuseumGuide
options:
  bundleIdPrefix: com.museumguide
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher.git
    from: 8.0.0

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  MuseumGuide:
    type: application
    platform: iOS
    sources:
      - path: MuseumGuide
    resources:
      - path: MuseumGuide/Assets.xcassets
    dependencies:
      - package: Kingfisher
    info:
      path: MuseumGuide/Info.plist
      properties:
        CFBundleDisplayName: 博物讲解
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: 拍摄展品进行识别讲解
        NSLocationWhenInUseUsageDescription: 定位当前所在博物馆
        NSMicrophoneUsageDescription: 语音讲解需要音频权限
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.museumguide.app
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES

  MuseumGuideTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MuseumGuideTests
    dependencies:
      - target: MuseumGuide
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.museumguide.app.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  MuseumGuide:
    build:
      targets:
        MuseumGuide: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MuseumGuideTests
